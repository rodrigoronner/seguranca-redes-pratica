# Ruleset nftables — Capítulo 4: Firewall
# Laboratório: Segurança de Redes na Prática
# Aplicar com: nft -f nftables.conf
# Persistir com: cp nftables.conf /etc/nftables.conf

table ip filter {
    chain INPUT {
        type filter hook input priority 0; policy drop;

        # Aceitar loopback
        iif lo accept

        # Aceitar conexões já estabelecidas / relacionadas
        ct state established,related accept

        # Aceitar ICMP
        ip protocol icmp accept

        # Bloquear Redis de origens externas
        iif != lo tcp dport 6379 drop

        # Permitir SSH apenas do container atacante
        ip saddr 192.168.10.10 tcp dport 22 accept

        # Bloquear SSH de qualquer outra origem
        tcp dport 22 drop

        # Liberar HTTP para qualquer origem
        tcp dport 80 accept
    }
}
