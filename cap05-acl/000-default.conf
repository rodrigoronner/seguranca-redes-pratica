# Virtual host Apache — Capítulo 5: Controle de Acesso
# Laboratório: Segurança de Redes na Prática
# Copiar para: /etc/apache2/sites-available/000-default.conf
# Aplicar com: service apache2 reload

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # Raiz: pública para todos
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Admin: IP correto E usuário autenticado (ambos obrigatórios)
    <Directory /var/www/html/admin>
        Options None
        AllowOverride None
        AuthType Basic
        AuthName "Painel Administrativo"
        AuthUserFile /etc/apache2/.htpasswd
        <RequireAll>
            Require ip 192.168.10.10
            Require valid-user
        </RequireAll>
    </Directory>

    # Interno: bloqueado para todos
    <Directory /var/www/html/interno>
        Options None
        AllowOverride None
        Require all denied
    </Directory>

    # API: GET livre, escrita restrita ao IP do atacante
    <Directory /var/www/html/api>
        Options None
        AllowOverride None
        <LimitExcept GET HEAD OPTIONS>
            Require ip 192.168.10.10
        </LimitExcept>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
