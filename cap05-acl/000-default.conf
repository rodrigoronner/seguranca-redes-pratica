<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # Diretorio raiz: publico para todos
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Diretorio admin: acesso apenas do contener atacante (192.168.10.10)
    <Directory /var/www/html/admin>
        Options None
        AllowOverride None
        Require ip 192.168.10.10
    </Directory>

    # Diretorio interno: bloqueado para todos
    <Directory /var/www/html/interno>
        Options None
        AllowOverride None
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
